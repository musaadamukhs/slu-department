<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course | SLU Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

{% include 'admin/sidebar.html' %}

<div class="main">
    <div class="topbar">
        <h1><i class="fas fa-plus-circle"></i> Add New Course</h1>
        <a href="{{ url_for('admin_courses') }}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Back to Courses
        </a>
    </div>

    <div class="dashboard-content">
        <div class="form-card">
            <form method="POST" action="{{ url_for('admin_add_course') }}">

                <div class="form-row">
                    <div class="form-group">
                        <label>Course Code *</label>
                        <input type="text" name="course_code"
                               placeholder="e.g. AEC 301" required>
                    </div>
                    <div class="form-group">
                        <label>Course Title *</label>
                        <input type="text" name="course_title"
                               placeholder="e.g. Agricultural Policy & Development"
                               required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Level *</label>
                        <select name="level" required>
                            <option value="">-- Select Level --</option>
                            <option value="100">100 Level</option>
                            <option value="200">200 Level</option>
                            <option value="300">300 Level</option>
                            <option value="400">400 Level</option>
                            <option value="500">500 Level (Postgrad)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Semester *</label>
                        <select name="semester" required>
                            <option value="">-- Select Semester --</option>
                            <option value="First Semester">First Semester</option>
                            <option value="Second Semester">Second Semester</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Assign Lecturer</label>
                    <select name="staff_id">
                        <option value="">-- Select Lecturer (Optional) --</option>
                        {% for member in staff_list %}
                        <option value="{{ member.id }}">
                            {{ member.full_name }} — {{ member.title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Course Description</label>
                    <textarea name="description" rows="4"
                        placeholder="Brief description of what this course covers...">
                    </textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Save Course
                    </button>
                    <a href="{{ url_for('admin_courses') }}" class="btn-cancel">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
