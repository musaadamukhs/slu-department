<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Staff | SLU Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

{% include 'admin/sidebar.html' %}

<div class="main">
    <div class="topbar">
        <h1><i class="fas fa-edit"></i> Edit Staff Member</h1>
        <a href="{{ url_for('admin_staff') }}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Back to Staff List
        </a>
    </div>

    <div class="dashboard-content">
        <div class="form-card">
            <form method="POST" action="{{ url_for('admin_edit_staff', id=member.id) }}" enctype="multipart/form-data"></form>
<div class="form-group">
    {% if member.photo and member.photo != 'default.jpg' %}
    <img src="{{ url_for('static', filename='images/staff/' + member.photo) }}"
         style="width:90px; height:90px; border-radius:50%; object-fit:cover; margin-bottom:10px; border:2px solid #1B5E20;">
    {% endif %}
    <label>Staff Photo (passport-style)</label>
    <input type="file" name="photo" accept=".jpg,.jpeg,.png,.webp">
    <small style="color:#9E9E9E; font-size:0.78rem;">Leave empty to keep the current photo.</small>
</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="full_name"
                               value="{{ member.full_name }}" required>
                    </div>
                    <div class="form-group">
                        <label>Title *</label>
                        <select name="title" required>
                            <option value="">-- Select Title --</option>
                            {% for t in ['Professor','Associate Professor','Senior Lecturer',
                                         'Lecturer I','Lecturer II','Assistant Lecturer',
                                         'Graduate Assistant','Senior Admin Officer','Admin Officer'] %}
                            <option value="{{ t }}"
                                {{ 'selected' if member.title == t else '' }}>
                                {{ t }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Rank *</label>
                        <select name="staff_rank" required>
                            <option value="">-- Select Rank --</option>
                            {% for r, label in [('professor','Professor'),
                                                ('lecturer','Lecturer'),
                                                ('non-academic','Non-Academic')] %}
                            <option value="{{ r }}"
                                {{ 'selected' if member.staff_rank == r else '' }}>
                                {{ label }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Specialization *</label>
                        <input type="text" name="specialization"
                               value="{{ member.specialization }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email"
                               value="{{ member.email }}">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" name="phone"
                               value="{{ member.phone }}">
                    </div>
                </div>

                <div class="form-group">
    <label>Bio / About</label>
    <textarea name="bio" rows="4">{{ member.bio }}</textarea>
</div>

<div class="form-group">
    <label>Academic Qualifications</label>
    <textarea name="qualifications" rows="3"
        placeholder="e.g. PhD Agricultural Economics (ABU Zaria), MSc..., BSc...">{{ member.qualifications or '' }}</textarea>
</div>

<div class="form-group">
    <label>Research Interests</label>
    <textarea name="research_interests" rows="3"
        placeholder="e.g. Farm management, rural finance, agricultural policy">{{ member.research_interests or '' }}</textarea>
</div>

<div class="form-group">
    <label>Publications</label>
    <textarea name="publications" rows="5"
        placeholder="List publications, one per line">{{ member.publications or '' }}</textarea>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Office Location</label>
        <input type="text" name="office_location"
               value="{{ member.office_location or '' }}" placeholder="e.g. Block A, Room 12">
    </div>
    <div class="form-group">
        <label>ORCID / Research ID</label>
        <input type="text" name="orcid"
               value="{{ member.orcid or '' }}" placeholder="e.g. 0000-0001-2345-6789">
    </div>
</div>

                <div class="form-check">
                    <input type="checkbox" name="is_hod" id="is_hod"
                           {{ 'checked' if member.is_hod else '' }}>
                    <label for="is_hod">
                        Set as <strong>Head of Department (HOD)</strong>
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Update Staff Member
                    </button>
                    <a href="{{ url_for('admin_staff') }}" class="btn-cancel">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
