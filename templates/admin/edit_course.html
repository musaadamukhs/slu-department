<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course | SLU Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

{% include 'admin/sidebar.html' %}

<div class="main">
    <div class="topbar">
        <h1><i class="fas fa-edit"></i> Edit Course</h1>
        <a href="{{ url_for('admin_courses') }}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Back to Courses
        </a>
    </div>

    <div class="dashboard-content">
        <div class="form-card">
            <form method="POST" action="{{ url_for('admin_edit_course', id=course.id) }}">

                <div class="form-row">
                    <div class="form-group">
                        <label>Course Code *</label>
                        <input type="text" name="course_code"
                               value="{{ course.course_code }}" required>
                    </div>
                    <div class="form-group">
                        <label>Course Title *</label>
                        <input type="text" name="course_title"
                               value="{{ course.course_title }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Level *</label>
                        <select name="level" required>
                            <option value="">-- Select Level --</option>
                            {% for l in [100, 200, 300, 400, 500] %}
                            <option value="{{ l }}"
                                {{ 'selected' if course.level == l else '' }}>
                                {{ l }} Level
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Semester *</label>
                        <select name="semester" required>
                            <option value="">-- Select Semester --</option>
                            {% for s in ['First Semester', 'Second Semester'] %}
                            <option value="{{ s }}"
                                {{ 'selected' if course.semester == s else '' }}>
                                {{ s }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Assign Lecturer</label>
                    <select name="staff_id">
                        <option value="">-- Not Assigned --</option>
                        {% for member in staff_list %}
                        <option value="{{ member.id }}"
                            {{ 'selected' if course.staff_id == member.id else '' }}>
                            {{ member.full_name }} — {{ member.title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Course Description</label>
                    <textarea name="description" rows="4">{{ course.description }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Update Course
                    </button>
                    <a href="{{ url_for('admin_courses') }}" class="btn-cancel">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
