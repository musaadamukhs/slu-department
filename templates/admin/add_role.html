<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Role | SLU Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

{% include 'admin/sidebar.html' %}

<div class="main">
    <div class="topbar">
        <h1><i class="fas fa-id-badge"></i> Assign New Role</h1>
        <a href="{{ url_for('admin_roles') }}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Back to Roles
        </a>
    </div>

    <div class="dashboard-content">
        <div class="form-card">
            <form method="POST" action="{{ url_for('admin_add_role') }}">

                <div class="form-row">
                    <div class="form-group">
                        <label>Staff Member *</label>
                        <select name="staff_id" required>
                            <option value="">-- Select Staff --</option>
                            {% for s in staff_list %}
                            <option value="{{ s.id }}">{{ s.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role *</label>
                        <select name="role_type_id" required>
                            <option value="">-- Select Role --</option>
                            {% for rt in role_types %}
                            <option value="{{ rt.id }}">{{ rt.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Department *</label>
                        <select name="department_id" required>
                            <option value="">-- Select Department --</option>
                            {% for d in departments %}
                            <option value="{{ d.id }}">{{ d.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Level (if applicable)</label>
                        <select name="level">
                            <option value="">-- Not Level Specific --</option>
                            <option value="100">100 Level</option>
                            <option value="200">200 Level</option>
                            <option value="300">300 Level</option>
                            <option value="400">400 Level</option>
                            <option value="500">500 Level</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Academic Session</label>
                    <input type="text" name="academic_session" placeholder="e.g. 2025/2026">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Assign Role
                    </button>
                    <a href="{{ url_for('admin_roles') }}" class="btn-cancel">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
